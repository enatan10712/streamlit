name: StreamVault CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Prisma Generate
      run: npx prisma generate
      env:
        DATABASE_URL: "postgresql://jules:jules@localhost:5432/streamvault" # CI Placeholder

    - name: Build
      run: npm run build
      env:
        NEXTAUTH_SECRET: "ci-test-secret"
        DATABASE_URL: "postgresql://jules:jules@localhost:5432/streamvault"
